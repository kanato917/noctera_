<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - NOCTERA</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="logo"><a href="index.html">NOCTERA</a></div>
        <nav>
            <ul>
                <li><a href="brand.html">Brand</a></li>
                <li><a href="collection.html">Collection</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-header">
            <h1 class="fade-in">Contact</h1>
            <p class="fade-in"
                style="transition-delay: 0.2s; color: var(--color-text-muted); margin-top: 20px; font-family: var(--font-heading); font-style: italic;">
                お問い合わせ</p>
        </section>

        <section class="container fade-in" style="padding: 100px 0;">
            <form class="contact-form" action="#" method="POST" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required placeholder="お名前">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="メールアドレス">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" required placeholder="メッセージ"></textarea>
                </div>
                <button type="submit" class="submit-btn" style="width: 100%;">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="logo">NOCTERA</div>
        <div class="footer-links">
            <a href="brand.html">Brand</a>
            <a href="collection.html">Collection</a>
            <a href="contact.html">Contact</a>
        </div>
        <p>&copy; 2026 NOCTERA. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
